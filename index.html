<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banner Splitter</title>
<style>
  *{box-sizing:border-box;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#1c1c1c; color:#eaeaea; margin:0; padding:20px 16px 60px;
  }
  .wrap{max-width:480px; margin:0 auto;}

  .topbar{display:flex; align-items:center; gap:10px; margin-bottom:22px;}
  .topbar img{width:30px; height:auto;}
  .topbar h1{font-size:17px; font-weight:700; margin:0; letter-spacing:-0.2px;}
  .topbar .tag{
    margin-left:auto; font-size:10.5px; font-weight:600; color:#c8e6a0;
    background:rgba(175,244,161,0.10); border:1px solid rgba(175,244,161,0.22);
    padding:4px 9px; border-radius:20px;
  }

  .card{
    background:#242424; border:1px solid #333333; border-radius:16px;
    padding:18px; margin-bottom:14px;
  }
  .card-label{
    font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em;
    color:#8a8a8a; margin-bottom:12px;
  }

  .upload{
    border:1.5px dashed #3d3d3d; border-radius:12px; padding:22px; text-align:center;
    cursor:pointer; color:#a0a0a0; font-size:13.5px; overflow:hidden;
    transition:border-color .15s;
  }
  .upload:hover{ border-color:#afe4a1; }
  .upload.filled{ border-style:solid; border-color:#333333; padding:0; }
  .upload.filled img{ width:100%; max-height:220px; object-fit:contain; display:block; background:#000; }
  .upload input{display:none;}
  .upload .fname{font-size:11px; color:#8a8a8a; padding:8px; background:#1c1c1c;}

  .row{display:flex; align-items:center; gap:12px;}
  input[type=range]{
    flex:1; height:4px; -webkit-appearance:none; background:#3a3a3a; border-radius:3px; outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:16px; height:16px; border-radius:50%;
    background:#afe4a1; cursor:pointer; box-shadow:0 0 0 3px rgba(175,244,161,0.20);
  }
  #zoomVal{font-size:13px; font-weight:700; width:46px; text-align:right; color:#afe4a1;}

  .spec{font-size:11.5px; color:#8a8a8a; margin-top:10px;}
  .spec b{color:#d4d4d4; font-weight:600;}

  .grid9{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .cell{display:flex; flex-direction:column; align-items:center; gap:5px;}
  .cell canvas{width:100%; height:auto; border-radius:8px; background:#000; border:1px solid #333333;}
  .cell .lbl{font-size:10.5px; font-weight:600; color:#787878;}

  .btn{
    width:100%; padding:15px; font-size:14.5px; font-weight:700; color:#12220f;
    background:#afe4a1; border:none; border-radius:12px; cursor:pointer; margin-top:2px;
    letter-spacing:0.01em;
  }
  .btn:disabled{ background:#333333; color:#6a6a6a; cursor:not-allowed; }
  .btn:active:not(:disabled){ transform:scale(0.99); }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAKAAAABZCAYAAAC5Ui/8AAABWGlDQ1BJQ0MgUHJvZmlsZQAAeJx9kLFLw1AQxr9WpaB1EB0cHDKJQ5SSCro4tBVEcQhVweqUvqapkMZHkiIFN/+Bgv+BCs5uFoc6OjgIopPo5uSk4KLleS+JpCJ6j+N+fO+74zggOW5wbvcDqDu+W1zKK5ulLSX1jAS9IAzm8Zyur0r+rj/j/T703k7LWb///43Biukxqp+UGcZdH0ioxPqezyXvE4+5tBRxS7IV8onkcsjngWe9WCC+JlZYzagQvxCr5R7d6uG63WDRDnL7tOlsrMk5lBNYxA48cNgw0IQCHdk//LOBv4BdcjfhUp+FGnzqyZEiJ5jEy3DAMAOVWEOGUpN3ju53F91PjbWDJ2ChI4S4iLWVDnA2Rydrx9rUPDAyBFy1ueEagdRHmaxWgddTYLgEjN5Qz7ZXzWrh9uk8MPAoxNskkDoEui0hPo6E6B5T8wNw6XwBA6diE8HYWhMAAAJISURBVHic7d3BbsIwEEXRSdX//+V0UZCyKCUhHo/fm3vWrQj4Mk5oRCMAAAAAAAAAAAAAJNiqD+COfd/36mO4Yts26dc7g/QLohbgETH++qo+gK72h+rjqEaAxbqHSICL6BohAS6kY4QEuJhuERLggjpFSICL6hIhAS6sQ4QEiFIEuDj3KUiAKEWAKEWAApy3YQJEKQJEKQJEKQJEKQJEKQJ8gVvm5yDAfxBhPgJ8wfmzt5UQ4BtMwVwEeAIR5iFAAc5vAAI8yTmCSgR4ARGOR4AXbQ8zH2/WY1WQDrBycdzDmEU6wGrZ07BD5PIBrrBId0L87/c6fBhevngjZCzUzLDfHf8Kb7Is8hMwQneBzn4zlvMktAhQzSdfyeYaoU2AI6dg5kS9E5JjhJJb1zt3FmrV+I5UTzn+YjMBjzKuSO9ynF4j2LyTXjm78GrxuUxBiydxxTOGWQuYOfkcIpR/AivL3nYdArQ8B4QOAkwy46LD4cKGAFGKABM4TKZZCFCceuwEiFIEiFLf1QewgpH346lvibO1DfBKKMefdfjwdyXtArw7oWb/Kc9dq3PAkdsjW+0YLQLM+qfQRHiffYDZkVRHqH4qYB3grDi4SPmcbYCzJ1P1JFRlGWBVDER4nWWAXThs93YBVk+h6sdXYxVgp8V3mH4RZgFCj02ATD9NNgFCk0WATD9dFgF24RZfBAHKcIwvwiDADtuva3wRBgG6c44vouEd0Srcw3tiAi6oS3wR4t+O5XT+1ym6I7bgQl2jAwAAAACgpx96pABydV0Y5AAAAABJRU5ErkJggg==" alt="logo">
    <h1>Banner Splitter</h1>
    <span class="tag">9-part split</span>
  </div>

  <div class="card">
    <div class="card-label">Source Image</div>
    <div class="upload" id="dropzone">
      <div><strong>Tap to upload an image</strong></div>
      <div style="font-size:11.5px;margin-top:4px;color:#5b5e66;">or drag and drop</div>
      <input type="file" id="fileInput" accept="image/*">
    </div>
  </div>

  <div class="card">
    <div class="card-label">Zoom</div>
    <div class="row">
      <input type="range" min="100" max="400" step="1" value="100" id="zoomSlider">
      <span id="zoomVal">100%</span>
    </div>
    <div class="spec">Output size: <b>400 × 685</b> · on black</div>
  </div>

  <div class="card">
    <div class="card-label">Preview — 9 Parts</div>
    <div class="grid9" id="grid9"></div>
  </div>

  <button class="btn" id="downloadAll" disabled>Download All (9)</button>
  <div class="spec" style="text-align:center;margin-top:8px;">On phone: opens Share Sheet → <b>Save Images</b> to save to your gallery</div>
</div>

<script>
const N = 9;

let img = null;
let imgName = '';
let zoom = 100;

/* ---- upload ---- */
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');

dropzone.addEventListener('click', ()=> fileInput.click());
fileInput.addEventListener('change', e=>{ if(e.target.files[0]) loadFile(e.target.files[0]); });
['dragenter','dragover'].forEach(ev=> dropzone.addEventListener(ev, e=>{ e.preventDefault(); dropzone.classList.add('filled'); }));
dropzone.addEventListener('drop', e=>{ e.preventDefault(); if(e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });

function loadFile(file){
  if(!file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    const image = new Image();
    image.onload = ()=>{
      img = image;
      imgName = file.name.replace(/\.[^.]+$/, '');
      dropzone.classList.add('filled');
      dropzone.innerHTML = `<img src="${ev.target.result}"><div class="fname">${file.name}</div>`;
      buildGrid();
      renderAll();
    };
    image.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

/* ---- zoom ---- */
const zoomSlider = document.getElementById('zoomSlider');
const zoomVal = document.getElementById('zoomVal');
zoomSlider.addEventListener('input', e=>{
  zoom = Number(e.target.value);
  zoomVal.textContent = zoom + '%';
  renderAll();
});

/* ---- build the 3x3 (9-cell) grid ---- */
const grid9 = document.getElementById('grid9');
function buildGrid(){
  grid9.innerHTML = '';
  for(let i=0; i<N; i++){
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.innerHTML = `<canvas id="cv-${i}"></canvas><div class="lbl">Part ${i+1}</div>`;
    grid9.appendChild(cell);
  }
}

/* ---- drawing: true 3x3 grid split — one framed rectangle of the source
   photo, sliced into 9 non-overlapping tiles that reconstruct it exactly
   when combined (like a real Instagram-grid split), not an overlapping pan ---- */
const OUT_W = 400, OUT_H = 685;
const PAD_SCALE = 0.778; // shrink factor for the letterbox bars (~76px on a 685-tall canvas)
const COLS = 3, ROWS = 3;

// One shared "frame" maps the whole source image to a COLS*OUT_W by ROWS*bandH
// rectangle (cover-fit + zoom, centered). Each panel just reads its own
// non-overlapping slice of that frame directly out of the source image.
function getFrame(bandH){
  const totalW = OUT_W * COLS, totalH = bandH * ROWS;
  if(!img) return { scale: 1, frameX: 0, frameY: 0, totalW, totalH };
  const baseScale = Math.max(totalW / img.width, totalH / img.height);
  const scale = baseScale * (zoom/100);
  const frameX = (totalW - img.width * scale) / 2;
  const frameY = (totalH - img.height * scale) / 2;
  return { scale, frameX, frameY, totalW, totalH };
}

function drawLetterboxed(ctx, w, h, row, col, bandH, bandY){
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,w,h);
  if(!img) return;
  const { scale, frameX, frameY } = getFrame(bandH);
  const sx = (col * OUT_W - frameX) / scale;
  const sy = (row * bandH - frameY) / scale;
  const sW = OUT_W / scale;
  const sH = bandH / scale;
  const band = document.createElement('canvas');
  band.width = w; band.height = bandH;
  const bctx = band.getContext('2d');
  bctx.fillStyle = '#000';
  bctx.fillRect(0,0,w,bandH);
  bctx.drawImage(img, sx, sy, sW, sH, 0, 0, w, bandH);
  ctx.drawImage(band, 0, bandY);
}

function renderPanel(i){
  const canvas = document.getElementById(`cv-${i}`);
  if(!canvas) return;
  canvas.width = OUT_W; canvas.height = OUT_H;
  const bandH = OUT_H * PAD_SCALE;
  const bandY = (OUT_H - bandH) / 2;
  const row = Math.floor(i / COLS);
  const col = i % COLS;
  drawLetterboxed(canvas.getContext('2d'), OUT_W, OUT_H, row, col, bandH, bandY);
}

function renderAll(){
  for(let i=0; i<N; i++) renderPanel(i);
  document.getElementById('downloadAll').disabled = !img;
}

function canvasToFile(canvas, filename){
  return new Promise(resolve=>{
    canvas.toBlob(blob=>{
      resolve(new File([blob], filename, { type:'image/png' }));
    }, 'image/png');
  });
}

async function getAllFiles(){
  const files = [];
  for(let i=0; i<N; i++){
    const canvas = document.getElementById(`cv-${i}`);
    files.push(await canvasToFile(canvas, `banner-${imgName}-part${i+1}.png`));
  }
  return files;
}

function downloadFallback(files){
  files.forEach((file, i)=>{
    setTimeout(()=>{
      const link = document.createElement('a');
      link.download = file.name;
      link.href = URL.createObjectURL(file);
      link.click();
    }, i * 300);
  });
}

document.getElementById('downloadAll').addEventListener('click', async ()=>{
  const files = await getAllFiles();
  if(navigator.canShare && navigator.canShare({ files })){
    try{
      await navigator.share({ files, title: 'Banner parts' });
      return;
    }catch(err){
      if(err.name === 'AbortError') return; // user cancelled the share sheet
      // fall through to download fallback on any other failure
    }
  }
  downloadFallback(files);
});
</script>
</body>
</html>
